name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Build
        run: swift build -c release

      - name: Create App Bundle
        run: |
          APP_NAME="KiroMeter"
          BUNDLE_DIR="KiroMeter.app"
          CONTENTS_DIR="${BUNDLE_DIR}/Contents"
          MACOS_DIR="${CONTENTS_DIR}/MacOS"
          
          mkdir -p "${MACOS_DIR}"
          cp ".build/release/${APP_NAME}" "${MACOS_DIR}/${APP_NAME}"
          
          cat > "${CONTENTS_DIR}/Info.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>KiroMeter</string>
              <key>CFBundleIdentifier</key>
              <string>dev.kirometer.app</string>
              <key>CFBundleName</key>
              <string>KiroMeter</string>
              <key>CFBundleDisplayName</key>
              <string>KiroMeter</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>CFBundleShortVersionString</key>
              <string>1.3.1</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>LSMinimumSystemVersion</key>
              <string>14.0</string>
              <key>LSUIElement</key>
              <true/>
              <key>NSHighResolutionCapable</key>
              <true/>
          </dict>
          </plist>
          EOF

      - name: Create ZIP
        run: zip -r KiroMeter-macOS.zip KiroMeter.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KiroMeter-macOS
          path: KiroMeter-macOS.zip

      - name: Generate Release Notes
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          # Get the previous tag to generate changelog
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREVIOUS_TAG=$(git tag --sort=-creatordate | grep -v "^${CURRENT_TAG}$" | head -1)
          
          echo "## KiroMeter ${CURRENT_TAG}" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          
          # Generate changelog from commits between tags
          if [ -n "$PREVIOUS_TAG" ]; then
            echo "### What's Changed" >> RELEASE_NOTES.md
            echo "" >> RELEASE_NOTES.md
            git log "${PREVIOUS_TAG}..${CURRENT_TAG}" --pretty=format:"- %s" --no-merges >> RELEASE_NOTES.md
            echo "" >> RELEASE_NOTES.md
            echo "" >> RELEASE_NOTES.md
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${CURRENT_TAG}" >> RELEASE_NOTES.md
          else
            echo "Initial release." >> RELEASE_NOTES.md
          fi
          
          echo "" >> RELEASE_NOTES.md
          echo "---" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### Installation" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "**One-line install (recommended):**" >> RELEASE_NOTES.md
          echo '```bash' >> RELEASE_NOTES.md
          echo 'curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install.sh | bash' >> RELEASE_NOTES.md
          echo '```' >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "**Manual:**" >> RELEASE_NOTES.md
          echo "1. Download \`KiroMeter-macOS.zip\`" >> RELEASE_NOTES.md
          echo "2. Unzip and move \`KiroMeter.app\` to \`/Applications\`" >> RELEASE_NOTES.md
          echo "3. Run: \`xattr -cr /Applications/KiroMeter.app\`" >> RELEASE_NOTES.md
          echo "4. Open the app" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### Prerequisites" >> RELEASE_NOTES.md
          echo "- macOS 14 (Sonoma) or later" >> RELEASE_NOTES.md
          echo "- [Kiro CLI](https://kiro.dev) installed and logged in (\`kiro-cli login\`)" >> RELEASE_NOTES.md
          echo "- *(Optional)* Kiro IDE installed — enables Prompt Logging detection" >> RELEASE_NOTES.md

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: KiroMeter-macOS.zip
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false

      - name: Run Tests
        continue-on-error: true
        run: swift test --enable-swift-testing --disable-xctest
